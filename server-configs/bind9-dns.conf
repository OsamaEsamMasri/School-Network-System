# ============================================
# BIND9 — named.conf.local
# Server: 192.168.40.10
# ============================================

# Forward zone — school.local
zone "school.local" {
    type master;
    file "/etc/bind/db.school.local";
};

# Reverse zone — 192.168.40.x
zone "40.168.192.in-addr.arpa" {
    type master;
    file "/etc/bind/db.192.168.40";
};


# ============================================
# BIND9 — named.conf.options
# ============================================

options {
    directory "/var/cache/bind";
    recursion yes;
    allow-query { 192.168.0.0/16; localhost; };
    forwarders { };
    dnssec-validation no;
    listen-on { any; };
};


# ============================================
# BIND9 — db.school.local (Forward Zone)
# ============================================

$TTL 604800
@   IN  SOA school.local. admin.school.local. (
            2024010101  ; Serial
            604800      ; Refresh
            86400       ; Retry
            2419200     ; Expire
            604800 )    ; Negative Cache TTL

; Name Servers
@       IN  NS      ns.school.local.

; A Records — Primary Server (192.168.40.10)
ns          IN  A   192.168.40.10
dns         IN  A   192.168.40.10
web         IN  A   192.168.40.10
intranet    IN  A   192.168.40.10
moodle      IN  A   192.168.40.10
dhcp        IN  A   192.168.40.10
school.local. IN A  192.168.40.10

; A Records — Secondary Server (192.168.40.20)
files       IN  A   192.168.40.20
ftp         IN  A   192.168.40.20
samba       IN  A   192.168.40.20


# ============================================
# BIND9 — db.192.168.40 (Reverse Zone)
# ============================================

$TTL 604800
@   IN  SOA school.local. admin.school.local. (
            2024010101
            604800
            86400
            2419200
            604800 )

@   IN  NS  ns.school.local.
10  IN  PTR ns.school.local.
10  IN  PTR web.school.local.
10  IN  PTR moodle.school.local.
20  IN  PTR files.school.local.
20  IN  PTR ftp.school.local.

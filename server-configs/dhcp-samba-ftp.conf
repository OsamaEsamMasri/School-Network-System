# ============================================
# ISC-DHCP — dhcpd.conf
# Server: 192.168.40.10
# ============================================

default-lease-time 600;
max-lease-time 7200;
authoritative;

# VLAN 10 — Administration
subnet 192.168.10.0 netmask 255.255.255.0 {
  range 192.168.10.10 192.168.10.50;
  option routers 192.168.10.1;
  option domain-name-servers 192.168.40.10;
  option domain-name "school.local";
}

# VLAN 20 — Teachers
subnet 192.168.20.0 netmask 255.255.255.0 {
  range 192.168.20.10 192.168.20.100;
  option routers 192.168.20.1;
  option domain-name-servers 192.168.40.10;
  option domain-name "school.local";
}

# VLAN 30 — Students
subnet 192.168.30.0 netmask 255.255.255.0 {
  range 192.168.30.10 192.168.30.200;
  option routers 192.168.30.1;
  option domain-name-servers 192.168.40.10;
  option domain-name "school.local";
}

# VLAN 40 — Servers (no DHCP, static IPs only)
subnet 192.168.40.0 netmask 255.255.255.0 {
  option routers 192.168.40.1;
  option domain-name-servers 192.168.40.10;
}


# ============================================
# Samba — smb.conf additions
# Server: 192.168.40.20
# ============================================

[global]
   workgroup = SCHOOL
   server string = School File Server
   netbios name = FILESERVER
   security = user
   map to guest = bad user
   dns proxy = no

[Shared]
   path = /srv/school/shared
   browseable = yes
   writable = yes
   guest ok = yes
   read only = no
   comment = Shared Files — All Users

[Teachers]
   path = /srv/school/teachers
   browseable = yes
   writable = yes
   guest ok = no
   valid users = teacher
   comment = Teachers Only

[Students]
   path = /srv/school/students
   browseable = yes
   writable = no
   guest ok = yes
   read only = yes
   comment = Student Resources — Read Only


# ============================================
# vsftpd.conf — FTP Server
# Server: 192.168.40.20
# ============================================

listen=YES
anonymous_enable=YES
anon_root=/srv/school/students
local_enable=YES
write_enable=YES
local_umask=022
dirmessage_enable=YES
use_localtime=YES
xferlog_enable=YES
connect_from_port_20=YES
chroot_local_user=YES
allow_writeable_chroot=YES
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100
